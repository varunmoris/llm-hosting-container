version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      python: 3.11
  pre_build:
    commands:
      - echo Pre-build started on `date`
      - echo Setting up Docker buildx.
      - docker buildx version
      - docker buildx create --name builder --driver docker-container --buildkitd-flags '--allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host' --use
      - docker buildx inspect --bootstrap --builder builder
      - docker buildx install
      - echo Preparing system dependencies for execution.
      - docker --version
      - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - curl -LO http://repo.continuum.io/miniconda/Miniconda3-latest-Linux-x86_64.sh
      - bash Miniconda3-latest-Linux-x86_64.sh -bfp /miniconda3
      - export PATH=/miniconda3/bin:${PATH}
      - conda install python=3.11
      - conda update -y conda
      - echo Prepare TGI dependencies for execution.
      - mkdir tgi-artifacts
      - aws s3 cp $ADDITIONAL_ARTIFACTS_S3_PATH/utils tgi-artifacts/ --recursive
      - aws s3 cp $ADDITIONAL_ARTIFACTS_S3_PATH/tgi tgi-artifacts/ --recursive
      - python -m pip install -r tgi-artifacts/tgi-requirements.txt
  build:
    commands:
      - echo Build started on `date`
      - python tgi-artifacts/tgi.py
  post_build:
    commands:
      - echo Build completed on `date`